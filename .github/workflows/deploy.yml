name: Deploy to UpCloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "==> Pulling latest changes..."
            cd /opt/creatio
            git pull origin main
            git submodule update --init --remote

            echo "==> Logging in to Creatio..."
            curl -s -c /tmp/creatio_cookie.txt \
              -H "Content-Type: application/json" \
              -X POST \
              "http://localhost:8080/ServiceModel/AuthService.svc/Login" \
              -d "{\"UserName\":\"${{ secrets.CREATIO_USER }}\",\"UserPassword\":\"${{ secrets.CREATIO_PASSWORD }}\"}"

            BPMCSRF=$(grep "BPMCSRF" /tmp/creatio_cookie.txt | awk '{print $7}')

            echo "==> Triggering compile..."
            curl -s \
              -b /tmp/creatio_cookie.txt \
              -H "Content-Type: application/json" \
              -H "BPMCSRF: $BPMCSRF" \
              -X POST \
              "http://localhost:8080/ServiceModel/WorkspaceExplorerService.svc/Rebuild" \
              -d '{}'

            echo "==> Done."
